# Tiny Tapeout project information (Wokwi project)
project:
  wokwi_id: "464171864719209473" # Set this to the ID of your Wokwi project (the number from the project's URL)
  title: "Everton - Tiny Tapeout Workshop LC26" # Project title
  author: "Everton Ribeiro" # Your name
  discord: "nuxlli" # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description: "8-Channel LED Pattern Sequencer" # One line description of what your project does
  language: "Wokwi" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz: 8 # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1" # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

