  ui[4]: "MODE_0"
  ui[5]: "SPEED_2"
  ui[6]: "SPEED_3"
  ui[7]: ""

  # Outputs
  uo[0]: "led0"
  uo[1]: "led1"
  uo[2]: "led2"
  uo[3]: "led3"
  uo[4]: "led4"
  uo[5]: "led5"
  uo[6]: "led6"
